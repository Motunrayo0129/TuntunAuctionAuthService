services:
  auth-service:
    build: .
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/auction_db
      - SPRING_DATASOURCE_USERNAME=auctionuser
      - SPRING_DATASOURCE_PASSWORD=Abi2901gael#
      - JWT_SECRET=yoursecretkey
    depends_on:
      - mysql
    networks:
      - auction-network

  mysql:
    image: 'mysql:latest'
    container_name: auction-mysql
    environment:
      - MYSQL_DATABASE=auction_db
      - MYSQL_USER=auctionuser
      - MYSQL_PASSWORD=Abi2901gael#
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - auction-network

volumes:
  mysql-data:

networks:
  auction-network:
    driver: bridge